<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Please Forgive Me</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ffe4ec, #fff6da, #e6f0ff);
      overflow: hidden;
      padding: 20px;
    }

    .card {
      width: min(90vw, 600px);
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.12);
      padding: 40px 28px 70px;
      text-align: center;
      position: relative;
    }

    h1 {
      font-size: clamp(2rem, 4vw, 3rem);
      color: #d63384;
      margin-bottom: 18px;
    }

    p {
      font-size: 1.08rem;
      line-height: 1.7;
      color: #444;
      margin-bottom: 28px;
    }

    .buttons-area {
      position: relative;
      height: 180px;
      margin-top: 10px;
    }

    button {
      border: none;
      padding: 14px 30px;
      font-size: 1rem;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.12);
    }

    button:hover {
      transform: scale(1.05);
    }

    #yesBtn {
      background: #ff4d8d;
      color: white;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-120%, -50%);
    }

    #noBtn {
      background: #f1f3f5;
      color: #333;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(20%, -50%);
    }

    .message {
      margin-top: 18px;
      font-size: 1.15rem;
      color: #c2185b;
      font-weight: bold;
      min-height: 28px;
    }

    .hearts {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      border-radius: 24px;
    }

    .heart {
      position: absolute;
      font-size: 20px;
      animation: floatUp 3.5s linear forwards;
      opacity: 0.9;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(1);
        opacity: 0.9;
      }
      100% {
        transform: translateY(-220px) scale(1.5);
        opacity: 0;
      }
    }

    @media (max-width: 520px) {
      .buttons-area {
        height: 220px;
      }

      #yesBtn,
      #noBtn {
        font-size: 0.95rem;
        padding: 12px 24px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="hearts" id="hearts"></div>
    <h1>I’m Sorry</h1>
    <p>
      I know I hurt you, and I genuinely regret it. You mean a lot to me, and I hate that I made you feel bad.
      I’m not asking you to forget everything instantly, but I really hope you can forgive me and let me make things right.
    </p>

    <h2 style="color:#555; margin-bottom: 10px;">Will you forgive me?</h2>

    <div class="buttons-area" id="playArea">
      <button id="yesBtn">Yes 💖</button>
      <button id="noBtn">No 🙈</button>
    </div>

    <div class="message" id="message"></div>
  </div>

  <script>
    const noBtn = document.getElementById('noBtn');
    const yesBtn = document.getElementById('yesBtn');
    const playArea = document.getElementById('playArea');
    const message = document.getElementById('message');
    const hearts = document.getElementById('hearts');

    function moveNoButton() {
      const areaRect = playArea.getBoundingClientRect();
      const btnRect = noBtn.getBoundingClientRect();

      const maxX = areaRect.width - btnRect.width;
      const maxY = areaRect.height - btnRect.height;

      const randomX = Math.max(0, Math.random() * maxX);
      const randomY = Math.max(0, Math.random() * maxY);

      noBtn.style.left = `${randomX}px`;
      noBtn.style.top = `${randomY}px`;
      noBtn.style.transform = 'translate(0, 0)';
    }

    noBtn.addEventListener('mouseenter', moveNoButton);
    noBtn.addEventListener('click', moveNoButton);
    noBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      moveNoButton();
    });

    yesBtn.addEventListener('click', () => {
      message.textContent = 'Thank youuu 🥹💗 I promise to do better.';
      createHearts();
    });

    function createHearts() {
      for (let i = 0; i < 18; i++) {
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.textContent = Math.random() > 0.5 ? '💖' : '💕';
        heart.style.left = `${Math.random() * 100}%`;
        heart.style.bottom = `${Math.random() * 20}px`;
        heart.style.animationDelay = `${Math.random() * 0.4}s`;
        hearts.appendChild(heart);

        setTimeout(() => heart.remove(), 3500);
      }
    }
  </script>
</body>
</html>
